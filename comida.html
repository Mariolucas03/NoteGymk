<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comida</title>
  <link rel="stylesheet" href="stylesComida.css">
</head>
<body>
<header>
  <div class="logo-container">
    <a href="index.html" class="logo-link">
      <img src="logo.png" alt="Logo NoteGymk" class="logo-img">
      <span class="logo-text">NoteGymk</span>
    </a>
  </div>
</header>

  <main>
    <form id="uploadForm">
      <label for="foodPhoto">Sube una foto de tu comida:</label>
      <input type="file" id="foodPhoto" accept="image/*">
      <button type="submit">Analizar calorías</button>
    </form>

    <div id="result">
      <!-- Aquí se mostrará la foto y las calorías -->
    </div>
  </main>

<footer>
  <button class="nav-btn active" onclick="location.href='comida.html'">
    <i class="fas fa-utensils"></i>
  </button>
  <button class="nav-btn" onclick="location.href='ejercicios.html'">
    <i class="fas fa-dumbbell"></i>
  </button>
  <button class="nav-btn" onclick="location.href='datos.html'">
    <i class="fas fa-chart-bar"></i>
  </button>
</footer>

<!-- Añade en el <head> de tu HTML -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">


  <script src="comida.js"></script>
</body>
</html>
