<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>NoteGymk - Datos</title>
  <link rel="stylesheet" href="stylesDatos.css">
</head>
<body>
  <!-- Cabecera -->
  <header>
    <div class="logo-container">
      <a href="index.html" class="logo-link">
        <img src="logo.png" alt="Logo NoteGymk" class="logo-img">
        <span class="logo-text">NoteGymk</span>
      </a>
    </div>
  </header>

  <main>
    <h1>Datos guardados</h1>

    <!-- Controles de calendario estilo iPhone -->
    <div id="calendar-header">
      <button id="prevMonth">◀</button>
      <h2 id="monthLabel"></h2>
      <button id="nextMonth">▶</button>
    </div>

    <div id="calendar"></div>
    <div id="detalle"></div>

    <!-- Botones de exportar/importar -->
    <div id="backup-controls">
      <button id="exportRutinas">📤 Exportar rutinas</button>
      <input type="file" id="importRutinas" accept="application/json">
    </div>
  </main>

  <!-- Footer -->
<footer>
  <button class="nav-btn active" onclick="location.href='comida.html'">
    <i class="fas fa-utensils"></i>
  </button>
  <button class="nav-btn" onclick="location.href='ejercicios.html'">
    <i class="fas fa-dumbbell"></i>
  </button>
  <button class="nav-btn" onclick="location.href='datos.html'">
    <i class="fas fa-chart-bar"></i>
  </button>
</footer>

<!-- Añade en el <head> de tu HTML -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">


  <script src="datos.js"></script>
</body>
</html>
