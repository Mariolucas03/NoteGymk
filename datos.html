<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>NoteGymk - Datos</title>
  <link rel="stylesheet" href="stylesDatos.css">
</head>
<body>
  <!-- Cabecera -->
  <header>
    <div class="logo-container">
      <a href="index.html" class="logo-link">
        <img src="logo.png" alt="Logo NoteGymk" class="logo-img">
        <span class="logo-text">NoteGymk</span>
      </a>
    </div>
  </header>

<main>
  <h1>Datos guardados</h1>
  <div id="calendar-controls">
    <button id="prevMonth">◀ Mes anterior</button>
    <span id="monthLabel"></span>
    <button id="nextMonth">Mes siguiente ▶</button>
  </div>
  <div id="calendar"></div>
  <div id="detalle"></div>

  <!-- Botones de exportar/importar -->
  <div id="backup-controls">
    <button id="exportRutinas">📤 Exportar rutinas</button>
    <input type="file" id="importRutinas" accept="application/json">
  </div>
</main>



  <!-- Footer -->
  <footer>
    <button onclick="location.href='comida.html'">🍽️ Comida</button>
    <button onclick="location.href='ejercicios.html'">🏋️ Ejercicios</button>
    <button onclick="location.href='datos.html'">📊 Datos</button>
  </footer>

  <script src="datos.js"></script>
</body>
</html>
