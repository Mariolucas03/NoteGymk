<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NoteGymk</title>
  <link rel="stylesheet" href="stylesindex.css">
</head>
<body>
  <!-- Cabecera -->
<header>
  <div class="logo-container">
    <a href="index.html" class="logo-link">
      <img src="logo.png" alt="Logo NoteGymk" class="logo-img">
      <span class="logo-text">NoteGymk</span>
    </a>
  </div>
</header>

  <!-- Página 1: Rutinas -->
  <section class="page">
    <main>
      <h1>Selecciona tu rutina de hoy</h1>
      <div class="rutinas">
        <button class="btn-rutina" data-tipo="pecho1">💪 Pecho, Hombro, Tríceps 1</button>
        <button class="btn-rutina" data-tipo="biceps1">💪 Bíceps, Espalda 1</button>
        <button class="btn-rutina" data-tipo="pierna1">🦵 Pierna, Abdomen 1</button>
        <button class="btn-rutina" data-tipo="cardio">🏃 Cardio</button>
        <button class="btn-rutina" data-tipo="padel">🎾 Padel</button>
      </div>
    </main>
  </section>

  <!-- Página 2: Resumen Diario -->
  <section class="page resumen">
    <main>
      <h1>📊 Resumen Diario</h1>
      <p>Aquí aparecerá tu resumen de entrenamientos y comidas.</p>
    </main>
  </section>

  <!-- Botones inferiores -->
  <footer>
    <button onclick="location.href='comida.html'">🍽️ Comida</button>
    <button onclick="location.href='ejercicios.html'">🏋️ Ejercicios</button>
    <button onclick="location.href='datos.html'">📊 Datos</button>
  </footer>

  <script>
    document.querySelectorAll(".btn-rutina").forEach(btn => {
      btn.addEventListener("click", () => {
        const tipo = btn.dataset.tipo;
        window.location.href = `rutina.html?tipo=${tipo}`;
      });
    });
  </script>
</body>
</html>
