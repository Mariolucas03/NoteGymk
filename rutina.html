<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>NoteGymk - Rutina</title>
  <link rel="stylesheet" href="stylesRutina.css">
</head>
<body>
  <!-- Cabecera igual que en index -->
<header>
  <div class="logo-container">
    <a href="index.html" class="logo-link">
      <img src="logo.png" alt="Logo NoteGymk" class="logo-img">
      <span class="logo-text">NoteGymk</span>
    </a>
  </div>
</header>


<main>
  <!-- Contenedor fijo -->
  <div class="timer-controls">
    <div id="contador">00:00</div>
    <button id="start">Iniciar</button>
    <button id="pause">Pausar</button>
  </div>

  <!-- Rutina -->
  <form id="rutinaForm">
    <div id="contenidoRutina"></div>
    <button type="submit" class="guardar">Guardar Rutina</button>
  </form>
</main>

  <!-- Footer igual que en index -->
<footer>
  <button class="nav-btn active" onclick="location.href='comida.html'">
    <i class="fas fa-utensils"></i>
  </button>
  <button class="nav-btn" onclick="location.href='ejercicios.html'">
    <i class="fas fa-dumbbell"></i>
  </button>
  <button class="nav-btn" onclick="location.href='datos.html'">
    <i class="fas fa-chart-bar"></i>
  </button>
</footer>

<!-- Añade en el <head> de tu HTML -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">


  <script src="rutina.js"></script>
</body>
</html>
